services:
  db:
    image: postgres:16-alpine
    container_name: filedb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: filedb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: web
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/filedb
    volumes:
      - tempfiles:/temp
    depends_on:
      db:
        condition: service_healthy

  trash_collector:
    build: .
    container_name: trash_collector
    command: ["python", "trash_collector.py"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/filedb
    volumes:
      - tempfiles:/temp
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  tempfiles:
